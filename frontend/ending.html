<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>죽기 24시간 전 — 엔딩</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/frontend/css/ending.css">
</head>
<body>
<div id="app">

  <!-- 노이즈 인트로 캔버스: 진입 시 강한 노이즈 → 점점 걷힘 -->
  <canvas id="noise-canvas"></canvas>

  <!-- 스캔라인 오버레이 -->
  <div class="noise-overlay"></div>

  <!-- 엔딩 본문: 노이즈가 걷힌 후 표시 -->
  <div class="ending-content" id="ending-content">
    <div class="ending-scroll" id="ending-scroll"></div>

    <!-- 다시 시작 버튼 -->
    <div class="restart-wrap" id="restart-wrap" style="display:none;">
      <button class="restart-btn" id="restart-btn">다시 시작</button>
    </div>
  </div>

</div>
<script src="/frontend/js/ending.js"></script>
</body>
</html>
